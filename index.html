<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>EcoMarket - Chía</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #4CAF50;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin: 30px;
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      width: 250px;
      padding: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .title {
      font-size: 18px;
      margin: 10px 0;
      font-weight: bold;
    }

    .price {
      color: #4CAF50;
      font-size: 20px;
      font-weight: bold;
    }

    .desc {
      font-size: 14px;
      color: #555;
      margin-bottom: 10px;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }
  </style>
</head>

<body>

<header>
  EcoMarket - Venta de Chía 🌱
</header>

<div class="container" id="productos"></div>

<script>
  fetch('http://localhost:3000/productos')
    .then(res => res.json())
    .then(data => {
      const contenedor = document.getElementById('productos');

      data.forEach(p => {
        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
          <img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Chia_seeds.jpg">
          <div class="title">${p.nombre}</div>
          <div class="desc">${p.descripcion}</div>
          <div class="price">S/ ${p.precio}</div>
          <button>Agregar al carrito</button>
        `;

        contenedor.appendChild(card);
      });
    });
</script>

</body>
</html>
